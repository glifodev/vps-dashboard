services:
  vps-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/backups:/opt/backups:ro
      - /opt/maintenance:/opt/maintenance:ro
      - /proc:/host/proc:ro
      - dashboard-data:/data
    environment:
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - DASHBOARD_SECRET=${DASHBOARD_SECRET}
      - EVO_API_URL=${EVO_API_URL}
      - EVO_API_KEY=${EVO_API_KEY}
      - EVO_INSTANCE=${EVO_INSTANCE}
      - ALERT_PHONE=${ALERT_PHONE}
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.http-0-n2s6nqqdq3ewhxlugiwrpbcf-vps-dashboard.service=vps-dashboard-svc"
      - "traefik.http.routers.https-0-n2s6nqqdq3ewhxlugiwrpbcf-vps-dashboard.service=vps-dashboard-svc"
      - "traefik.http.services.vps-dashboard-svc.loadbalancer.server.port=3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  coolify:
    external: true

volumes:
  dashboard-data:
